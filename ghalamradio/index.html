<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="../images/ghalamradio-og.png">
<link rel="apple-touch-icon" href="../images/ghalamradio-og.png">
<title>GhalamRadio – Stations Shared With You</title>

<!-- Rich link preview (iMessage, Mail, social). Absolute URLs required. -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://ghalam.net/ghalamradio/share/index.html">
<meta property="og:title" content="GhalamRadio — stations shared with you">
<meta property="og:description" content="Open in GhalamRadio to add these stations.">
<meta property="og:image" content="https://ghalam.net/ghalamradio/images/ghalamradio-og.png">
<meta property="og:image:width" content="512">
<meta property="og:image:height" content="512">
<meta property="og:image:type" content="image/png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="GhalamRadio — stations shared with you">
<meta name="twitter:description" content="Open in GhalamRadio to add these stations.">
<meta name="twitter:image" content="https://ghalam.net/ghalamradio/images/ghalamradio-og.png">

<!-- Smart App Banner. Replace the id with GhalamRadio's App Store ID. -->
<meta name="apple-itunes-app" content="app-id=REPLACE_WITH_GHALAMRADIO_APPSTORE_ID">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #161820;
    --border:    #2a2d3a;
    --text:      #e8eaf0;
    --muted:     #8b8fa8;
    --accent:    #c8a96e;
    --accent2:   #7eb8d4;
    --radius:    14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── NAV ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  nav .brand {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.02em;
  }
  nav .nav-links { display: flex; gap: 2rem; list-style: none; }
  nav .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  nav .nav-links a:hover { color: var(--text); }

  /* ── HERO ── */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 4.5rem 2rem 4rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(200,169,110,0.08) 0%, transparent 70%);
    top: -120px; left: 50%; transform: translateX(-50%);
    pointer-events: none;
  }
  .app-icon {
    width: 110px; height: 110px;
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
    margin-bottom: 1.75rem;
    object-fit: cover;
  }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400;
    line-height: 1.15;
    margin-bottom: 0.9rem;
    color: var(--text);
  }
  .hero h1 span { color: var(--accent); font-style: italic; }
  .hero .tagline {
    font-size: 1.08rem;
    color: var(--muted);
    max-width: 460px;
    margin-bottom: 2.25rem;
  }

  /* ── STATION LIST ── */
  .station-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.5rem 0;
    width: 100%;
    max-width: 420px;
    margin-bottom: 2.5rem;
    text-align: left;
    overflow: hidden;
  }
  .station-card .station {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 0.7rem 1.25rem;
  }
  .station-card .station + .station { border-top: 1px solid var(--border); }
  .station-card .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent2); flex-shrink: 0;
  }
  .station-card .name {
    font-size: 0.95rem; font-weight: 400; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── BUTTONS ── */
  .badge-link { display: inline-block; }
  .badge-link img { height: 50px; }
  .open-app {
    display: inline-block;
    margin-top: 1.25rem;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 400;
    text-decoration: none;
    letter-spacing: 0.03em;
    border-bottom: 1px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .open-app:hover { color: var(--accent); border-color: var(--accent); }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.82rem;
  }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  @media (max-width: 600px) {
    nav { padding: 1rem; }
    nav .nav-links { gap: 1.25rem; }
    .hero { padding: 3.5rem 1.25rem 3rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="../index.html" class="brand">GhalamRadio</a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="https://ghalam.net/" target="_blank">Ghalam.net</a></li>
  </ul>
</nav>

<div class="hero">
  <img src="../images/ghalamradio-og.png" alt="GhalamRadio App Icon" class="app-icon">
  <h1>Stations <span>shared with you</span></h1>
  <p class="tagline" id="subtitle">Open in GhalamRadio to add them to your list.</p>

  <div class="station-card" id="stationCard" hidden></div>

  <a href="https://apps.apple.com/app/idREPLACE_WITH_GHALAMRADIO_APPSTORE_ID" class="badge-link" target="_blank">
    <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
  </a>

  <!-- If GhalamRadio is installed, iOS opens it before this page loads.
       This lets a freshly-installed user re-trigger the import. -->
  <a href="#" class="open-app" id="openApp">Already have the app? Open in GhalamRadio</a>
</div>

<footer>
  <p>© 2026 GhalamRadio &nbsp;·&nbsp; <a href="https://ghalam.net/">Ghalam.net</a></p>
</footer>

<script>
  // Re-trigger the deep link (same URL) for users who just installed the app.
  document.getElementById('openApp').href = window.location.href;

  function base64UrlDecode(s) {
    s = s.replace(/-/g, '+').replace(/_/g, '/');
    while (s.length % 4) s += '=';
    return decodeURIComponent(escape(atob(s)));
  }

  try {
    const d = new URLSearchParams(window.location.search).get('d');
    if (d) {
      const csv = base64UrlDecode(d);
      // Rows are newline-separated; first row is the header. Field delimiter is ^%^.
      const names = csv.split('\n').slice(1)
        .filter(r => r.trim().length)
        .map(r => r.split('^%^')[0].trim())
        .filter(Boolean);

      if (names.length) {
        document.getElementById('subtitle').textContent =
          names.length === 1
            ? 'Someone shared a station with you. Open in GhalamRadio to add it.'
            : `Someone shared ${names.length} stations with you. Open in GhalamRadio to add them.`;

        const card = document.getElementById('stationCard');
        card.hidden = false;
        names.forEach(n => {
          const row = document.createElement('div');
          row.className = 'station';
          const dot = document.createElement('span');
          dot.className = 'dot';
          const name = document.createElement('span');
          name.className = 'name';
          name.textContent = n;
          row.appendChild(dot);
          row.appendChild(name);
          card.appendChild(row);
        });
      }
    }
  } catch (e) {
    /* Fall back to the default copy if decoding fails. */
  }
</script>

</body>
</html>
